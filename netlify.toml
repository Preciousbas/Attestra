[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  VITE_API_URL = "/api"

[[redirects]]
  from = "/api/signals/generate"
  to = "/.netlify/functions/signals-generate-background"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@0gfoundation/0g-ts-sdk", "ethers"]

[functions.api]
  timeout = 26

[functions."signals-generate-background"]
  timeout = 300
